# Example production values override for Hermes Agent Helm Chart
# Copy this file and fill in your secrets, then:
#   helm install hermes ./hermes-helm -f values-prod.yaml

secrets:
  # ⚠️ REQUIRED: Set your API keys
  anthropicApiKey: "sk-ant-..."
  openaiApiKey: "sk-..."          # Optional if only using Anthropic
  apiServerKey: ""                # REQUIRED: min 8 chars, e.g. openssl rand -hex 16
  webuiAuthToken: ""              # Auto-generated if empty (recommended)

hermes:
  dashboard:
    # Enable the built-in dashboard (optional; Web UI is richer)
    enabled: false
    basicAuthUsername: "admin"
    basicAuthPassword: "changeme"

  # Resource allocation for production
  resources:
    requests:
      memory: "2Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "4"

  # Node affinity — pin to a specific node if desired
  # nodeSelector:
  #   workload: ai
  # affinity:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #         - matchExpressions:
  #             - key: node-type
  #               operator: In
  #               values:
  #                 - high-memory

web_ui:
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

persistence:
  size: 50Gi
  # storageClass: "your-fast-ssd-class"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  tls:
    - secretName: hermes-tls
      hosts:
        - hermes.example.com
  hosts:
    - host: hermes.example.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: hermes-web-ui
          servicePort: 8648
